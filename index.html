
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يونس صوفان | موقع التخرج</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* الإطار والظل الذي أعجبك مع إضافة تأثير حركة عصري عند اللمس */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* الإطار الافتراضي */
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* تأثير الحركة */
        }
        /* حركة تفاعلية عصرية عند مرور الماوس أو اللمس */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        /* تصغير الخط لضمان ظهور الاسم كاملاً في سطر واحد دون انقسام */
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 21px; 
            white-space: nowrap; /* تمنع انقسام الاسم إلى سطرين */
        }
        p {
            color: #7f8c8d;
            font-size: 15px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>يونس صوفان</h1>
        <p>أهلاً بكم في موقعي الرقمي. يسعدني مشاركتكم لي فرحة تخرجي، وهنا أضع بين أيديكم نافذة صغيرة لاستعراض جانب من أعمالي ومسيرتي خلال سنوات الدراسة.</p>
        <a href="#" class="btn">تصفح أعمالي</a>
    </div>

</body>
</html>
