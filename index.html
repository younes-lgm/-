<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يونس صوفان | موقع التخرج</title>
    <style>
        /* التنسيق البسيط والناجح بألوان جديدة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9; /* خلفية رمادية فاتحة ومريحة */
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border-top: 5px solid #c5a880; /* خط ذهبي أنيق في أعلى البطاقة */
        }
        h1 {
            color: #1a252f; /* لون كحلي فاخر للاسم */
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 700;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #1a252f; /* زر باللون الكحلي */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover {
            background-color: #c5a880; /* يتحول للذهبي عند تمرير الماوس أو الضغط */
            color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>يونس صوفان</h1>
        <p>أهلاً بكم في موقعي الرقمي. يسعدني مشاركتكم لي فرحة تخرجي، وهنا أضع بين أيديكم نافذة صغيرة لاستعراض جانب من أعمالي ومسيرتي خلال سنوات الدراسة.</p>
        <a href="#" class="btn">تصفح أعمالي</a>
    </div>

</body>
</html>
